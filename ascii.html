<!DOCTYPE html>
<html>
<head>
  <title>ascii</title>
  <meta charset="UTF-8">
  <link rel="shortcut icon" href="files/favicon.png"/>
  <style>
    @font-face {
      font-family: Menlo;
      src: url('fonts/Menlo.otf') format("opentype");
    }
    body {
      background-color: #000000;
      margin: 0px;
   }
    section {
      height: 100vh;
    }
    .text p {
      margin: 0px;
      position: relative;
      top: 50%;
      transform: translateY(-50%);
      -webkit-transform: translateY(-50%);
      -ms-transform: translateY(-50%);
      transform-style: preserve-3d;
    }
    p {
      font-family: Menlo, monospace;
      font-size: 70px;
      text-align: center;
      line-height: 2.0;
    }
    a:link {
      color: #00f72c;
      padding: 10px 20px;
      text-decoration:none;
      border-style: solid;
      border-width: thin;
    }
    a:hover {
      color: #000000;
      background-color: #00f72c;
    }
  </style>
</head>

<body>
<section class="text">
  <p>
    <a href="library">library</a>
    <a href="river">river</a>
    <a href="spiral">spiral</a>
    <a href="war">war</a>
    <a href="wheel">wheel</a>
    <a href="wheel-colorful">wheel (colorful)</a>
  </p>
</section>
</body>
</html>
